name: Validate Tool PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up UV
        uses: astral-sh/setup-uv@v7

      - name: Validate tools.json schema
        run: uv run scripts/checks.py

      - name: Extract added tools from diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          set +e
          TOOLS=$(uv run scripts/diff_tools.py --base origin/${{ github.base_ref }})
          EXIT=$?
          set -e
          if [ $EXIT -eq 2 ]; then
            echo "no_new_tools=true" >> $GITHUB_OUTPUT
            echo "No new tools in this PR — schema-only change."
          elif [ $EXIT -ne 0 ]; then
            echo "diff_error=true" >> $GITHUB_OUTPUT
          else
            echo "tools=$TOOLS" >> $GITHUB_OUTPUT
            echo "no_new_tools=false" >> $GITHUB_OUTPUT
          fi

      - name: Test new tools via uvx
        if: steps.diff.outputs.no_new_tools != 'true' && steps.diff.outputs.diff_error != 'true'
        id: test
        continue-on-error: true
        run: |
          uv run scripts/test_clients.py \
            --tools '${{ steps.diff.outputs.tools }}' \
            --output output.log

      - name: Comment on PR — tool failure
        if: steps.test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let failures = [];
            try {
              failures = JSON.parse(fs.readFileSync('output.log', 'utf8'));
            } catch (e) {
              failures = [{ package: 'unknown', reason: 'execution_error' }];
            }

            const reasonMessages = {
              network: [
                '> ⚠️ This may be a transient PyPI outage.',
                '> Please re-run the workflow before amending your PR.',
              ].join('\n'),
              not_found: [
                '> ❌ The package name does not exist on PyPI.',
                '> Please double-check the package name and try again.',
              ].join('\n'),
              wrong_binary: [
                '> ❌ The package installed but the declared binary was not found.',
                '> Please verify the `execs` field matches the actual binary name.',
              ].join('\n'),
              execution_error: [
                '> ❌ The tool ran but exited with an error.',
                '> Please verify the package works with `uvx --from <package> <binary> --help`.',
              ].join('\n'),
            };

            const lines = failures.map(f => {
              const hint = reasonMessages[f.reason] ?? reasonMessages.execution_error;
              return `### \`${f.package}\` — ${f.reason.replace('_', ' ')}\n${hint}`;
            }).join('\n\n');

            const body = [
              '## ❌ Tool validation failed',
              '',
              'The following tool(s) proposed in this PR could not be validated:',
              '',
              lines,
              '',
              '---',
              '_Please amend your PR and push again. The workflow will re-run automatically._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Auto-approve PR
        if: steps.test.outcome == 'success' || steps.diff.outputs.no_new_tools == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ All proposed tools validated successfully via `uvx`. Ready for merge.',
            });

      - name: Fail job if tool tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

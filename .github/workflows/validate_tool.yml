name: Validate Tool PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate tools.json schema
        run: uv run scripts/checks.py

      - name: Test newly added tools via uvx
        id: test
        continue-on-error: true
        run: uv run scripts/test_clients.py --diff origin/main --output output.log

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Comment on PR — tool failure
        if: steps.test.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: comment_failure
        run: bun run scripts/check_and_comment.ts

      - name: Auto-approve PR
        if: steps.test.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: approve
        run: bun run scripts/check_and_comment.ts

      - name: Fail job if tool tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

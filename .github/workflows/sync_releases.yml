name: Sync PyPI Release Metadata

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Fetch latest release info from PyPI
        run: uv run scripts/latest_release.py

      - name: Create pull request if metadata changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(tools): sync latest PyPI release metadata'
          title: 'chore(tools): sync latest PyPI release metadata'
          body: 'Automated PyPI release metadata sync.'
          branch: chore/sync-pypi-release-metadata
          delete-branch: true
          add-paths: tools.json

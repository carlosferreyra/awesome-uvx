name: Validation and Sync

on:
  push:
    branches:
      - main
    paths:
      - 'tools.json'
      - 'scripts/**'
      - 'template/**'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate tools.json schema
        run: uv run scripts/checks.py

      - name: Test tools via uvx
        id: test
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            uv run scripts/test_clients.py --diff HEAD~1 --output output.log
          else
            uv run scripts/test_clients.py --all --output output.log
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            checks.log
            output.log
          retention-days: 30

      - name: Remove logs from workspace
        if: always()
        run: rm -f checks.log output.log

      - name: Detect README-affecting changes
        id: readme_changed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if git diff --name-only HEAD~1 HEAD | grep -qE '^(tools\.json|template/)'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate README
        if: steps.readme_changed.outputs.changed == 'true'
        run: uv run scripts/readme.py

      - name: Commit README if changed
        if: steps.readme_changed.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(readme): regenerate from tools.json [skip ci]'
          file_pattern: README.md

      - name: Fail job if any tools failed
        if: steps.test.outcome == 'failure'
        run: exit 1

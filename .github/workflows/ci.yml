name: Monthly Validation

on:
  push:
    branches:
      - main
    paths:
      - 'tools.json'
      - 'scripts/**'
      - 'template/**'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up UV
        uses: astral-sh/setup-uv@v7

      - name: Validate tools.json schema
        run: uv run scripts/checks.py

      - name: Build full tools list
        id: tools
        run: |
          TOOLS=$(uv run - <<'EOF'
          import json, sys
          with open("tools.json") as f:
              cats = json.load(f)["categories"]
          tools = [{"package": k, "execs": v["execs"]} for c in cats for k, v in c["tools"].items()]
          print(json.dumps(tools))
          EOF
          )
          echo "json=$TOOLS" >> $GITHUB_OUTPUT

      - name: Test all tools via uvx
        continue-on-error: true
        id: test
        run: |
          uv run scripts/test_clients.py \
            --tools '${{ steps.tools.outputs.json }}' \
            --output output.log

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            checks.log
            output.log
          retention-days: 30

      - name: Remove logs from workspace
        if: always()
        run: rm -f checks.log output.log

      - name: Generate README
        run: uv run scripts/readme.py

      - name: Commit README if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(readme): regenerate from tools.json [skip ci]'
          file_pattern: README.md

      - name: Fail job if any tools failed
        if: steps.test.outcome == 'failure'
        run: exit 1

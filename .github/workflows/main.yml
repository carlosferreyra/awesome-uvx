name: Test Packages

on:
  pull_request:
    branches:
      - main
    paths:
      - 'README.md'
      - 'tools.json'
      - 'scripts/**'
      - 'template/**'
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'tools.json'
      - 'scripts/**'
      - 'template/**'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['ubuntu-latest', 'windows-latest', 'macos-latest']
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - if: runner.os != 'Windows'
        name: Make check script executable
        run: chmod +x scripts/checks.py

      - continue-on-error: true
        id: validation
        name: Run validation checks
        run: uv run scripts/checks.py

      - if: always()
        name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: checks.log
          retention-days: 30

      - if: always()
        name: Remove checks.log from workspace
        run: rm -f checks.log

      - if: steps.validation.outcome == 'failure'
        name: Check validation status
        run: exit 1
